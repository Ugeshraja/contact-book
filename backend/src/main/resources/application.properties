# ===== Server =====
# PORT env var is set automatically by Render/Railway; defaults to 8080 locally
server.port=${PORT:8080}

# ===== Database (MySQL) =====
# Set these as environment variables. For local dev create a .env or just
# export them in your terminal / IDE run configuration.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/contact_book_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# update = auto create/alter the "contacts" table based on the Contact entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== App =====
spring.application.name=contact-book

# Frontend URL used by CorsConfig (set this on your host, e.g. Vercel URL)
# FRONTEND_URL=https://your-frontend.vercel.app
